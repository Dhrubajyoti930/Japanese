<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kana - Pro Edition</title>
    <style>
        :root {
            --primary-base: 255, 107, 107;
            --secondary-color: #4ecdc4;
            --google-blue: #4285F4;
            --goal-green: #2ecc71;
            --repeat-purple: #a29bfe;
            --repeat-active: #6c5ce7;
            --accent-color: #ffe66d;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
            overflow-x: hidden; /* Prevent horizontal scroll when cartoon pops */
        }

        body.no-scroll {
            overflow: hidden;
        }

        /* --- NEW CARTOON ANIMATIONS --- */
        .mascot {
            position: fixed;
            bottom: 20%;
            font-size: 80px;
            pointer-events: none;
            z-index: 2000;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        @keyframes bounceFromLeft {
            0% { transform: translateX(-150px) rotate(-20deg) scale(0.5); opacity: 0; }
            60% { transform: translateX(40px) rotate(10deg) scale(1.2); opacity: 1; }
            80% { transform: translateX(20px) rotate(0deg) scale(1); }
            100% { transform: translateX(-150px) rotate(-20deg); opacity: 0; }
        }

        @keyframes bounceFromRight {
            0% { transform: translateX(150px) rotate(20deg) scale(0.5); opacity: 0; }
            60% { transform: translateX(-40px) rotate(-10deg) scale(1.2); opacity: 1; }
            80% { transform: translateX(-20px) rotate(0deg) scale(1); }
            100% { transform: translateX(150px) rotate(20deg); opacity: 0; }
        }

        .pop-left { animation: bounceFromLeft 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; left: 0; }
        .pop-right { animation: bounceFromRight 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; right: 0; }
        /* ------------------------------ */

        .typing-area {
            width: 100%;
            max-width: 500px;
            background: white;
            border: 3px solid var(--secondary-color);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }

        #display-text {
            min-height: 50px;
            font-size: 2.2rem;
            word-wrap: break-word;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            color: #2d3436;
        }

        #meaning-display {
            min-height: 24px;
            font-size: 1.1rem;
            color: #636e72;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btns button {
            padding: 10px 18px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btns button:active { transform: scale(0.92); }

        #playBtn { background-color: rgb(var(--primary-base)); color: white; }
        #repeatBtn { background-color: var(--repeat-purple); color: white; }
        #repeatBtn.active { background-color: var(--repeat-active); box-shadow: 0 0 12px var(--repeat-active); }
        #googleBtn { background-color: var(--google-blue); color: white; }
        #saveBtn { background-color: var(--accent-color); color: #333; }
        #goalBtn { background-color: var(--goal-green); color: white; }
        #clearBtn { background-color: #dfe6e9; color: var(--text-color); }
        
        #randomBtn { 
            background: linear-gradient(135deg, #9b59b6, #8e44ad); 
            color: white; 
            margin-top: 10px; 
            width: 100%; 
            max-width: 500px; 
            border-radius: 15px; 
            padding: 16px; 
            border:none; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
        }

        .section-container {
            width: 100%;
            max-width: 500px;
            margin-top: 25px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            border-left: 5px solid var(--secondary-color);
            padding-left: 10px;
            margin-bottom: 12px;
        }

        .word-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .word-item {
            background: white;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .char-btn {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: none;
            transition: transform 0.1s;
        }
        .char-btn:active { transform: scale(0.9); }

        .emoji-hint { font-size: 0.8rem; margin-top: 4px; opacity: 0.8; }
        .empty { visibility: hidden; }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
        }

        #randomModal {
            display: none;
            flex-direction: column;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
        }

        #randomList {
            overflow-y: auto;
            flex-grow: 1;
            margin: 15px 0;
            padding-right: 8px;
        }

        .close-btn {
            margin-top: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: none;
            background: #f1f2f6;
            color: #2d3436;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">Master Kana Writer</h2>

    <div class="typing-area">
        <div id="display-text"></div>
        <div id="meaning-display">Welcome! Start typing...</div>
        <div class="action-btns">
            <button id="playBtn">▶ Hear</button>
            <button id="repeatBtn">🔁 Loop</button>
            <button id="googleBtn">🔍 Mean</button>
            <button id="saveBtn">💾 Dict</button>
            <button id="goalBtn">🎯 Goal</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <button id="randomBtn">🎲 Get Random 10 Study Words</button>

    <div style="margin: 20px 0;">
        <button id="modeBtn" style="padding:12px 24px; border-radius:30px; border:none; background:var(--secondary-color); color:white; font-weight:bold; cursor:pointer; box-shadow: 0 4px 10px rgba(78, 205, 196, 0.3);">Mode: Hiragana</button>
    </div>

    <div id="soundGrid" class="grid"></div>

    <div class="section-container">
        <div class="section-title">🎯 My Learning Goals</div>
        <div id="goalList" class="word-list"></div>
    </div>

    <div class="section-container">
        <div class="section-title">💾 Saved Dictionary</div>
        <div id="dictList" class="word-list"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="randomModal">
        <h3 style="margin:0; color:#8e44ad; display: flex; align-items: center; gap: 10px;">
            <span>🎲</span> Today's Random 10
        </h3>
        <div id="randomList" class="word-list"></div>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script>
        const commonWords = [
            "私 (I)", "水 (Water)", "学校 (School)", "先生 (Teacher)", "学生 (Student)", 
            "友達 (Friend)", "家族 (Family)", "本 (Book)", "猫 (Cat)", "犬 (Dog)", 
            "食べる (Eat)", "飲む (Drink)", "行く (Go)", "来る (Come)", "今日 (Today)", 
            "明日 (Tomorrow)", "日本 (Japan)", "名前 (Name)", "時間 (Time)", "元気 (Healthy)"
        ];

        const mascots = ['🐱', '🐰', '🦊', '🐻', '🐸', '🐼', '🐨', '🦄', '🐯'];

        const kanaData = [
            ['あ', 'ア', '🦆', '鴨', 9], ['い', 'イ', '🍓', '苺', 10], ['う', 'ウ', '🐰', '兎', 8], ['え', 'エ', '🍤', '海老', 4], ['お', 'オ', '👹', '鬼', 7],
            ['か', 'カ', '🐦‍⬛', '鴉', 8], ['き', 'キ', '🍄', '茸', 6], ['く', 'ク', '🐻', '熊', 6], ['け', 'ケ', '🪵', '毛', 4], ['こ', 'コ', '☕', '粉', 6],
            ['さ', 'サ', '🐟', '魚', 5], ['し', 'シ', '🦌', '鹿', 8], ['す', 'ス', '🍉', '西瓜', 6], ['せ', 'セ', '🧼', '石鹸', 3], ['そ', 'ソ', '🐘', '象', 4],
            ['た', 'タ', '🐙', '蛸', 7], ['ち', 'チ', '🧀', '乳', 4], ['つ', 'ツ', '🌙', '月', 5], ['て', 'テ', '✋', '手', 8], ['と', 'ト', '🐯', '虎', 7],
            ['な', 'ナ', '🍆', '茄子', 7], ['に', 'ニ', '🥕', '人参', 9], ['ぬ', 'ヌ', '🧣', '布', 2], ['ね', 'ネ', '🐱', '猫', 3], ['の', 'ノ', '🪵', '糊', 10],
            ['は', 'ハ', '🌸', '花', 7], ['ひ', 'ヒ', '🐑', '羊', 3], ['ふ', 'フ', '🚢', '船', 3], ['へ', 'ヘ', '🐍', '蛇', 2], ['ほ', 'ホ', '🌠', '星', 3],
            ['ま', 'マ', '🍄', '豆', 5], ['み', 'ミ', '🍊', '蜜寒', 4], ['む', 'ム', '🐞', '虫', 3], ['め', 'メ', '👓', '目', 3], ['も', 'モ', '🍑', '桃', 5],
            ['や', 'ヤ', '⛰️', '山', 4], [null, null, '', '', 0], ['ゆ', 'ユ', '❄️', '雪', 3], [null, null, '', '', 0], ['よ', 'ヨ', '⛵', '夜', 5],
            ['ら', 'ラ', '🦁', '雷', 5], ['り', 'リ', '🍎', '林檎', 5], ['る', 'ル', '💡', '留', 7], ['れ', 'レ', '🍋', '礼', 4], ['ろ', 'ロ', '🕯️', '蝋', 3],
            ['わ', 'ワ', '🐊', '和', 4], [null, null, '', '', 0], [null, null, '', '', 0], [null, null, '', '', 0], ['を', 'ヲ', '🔗', '遠', 6],
            [null, null, '', '', 0], [null, null, '', '', 0], [null, null, '', '', 0], [null, null, '', '', 0], ['ん', 'ン', '🔔', '運', 9]
        ];

        let dictionary = JSON.parse(localStorage.getItem('kanaDict_v3') || '[]');
        let goals = JSON.parse(localStorage.getItem('kanaGoals_v3') || '[]');
        let currentMode = 0;
        let repeatInterval = null;

        const displayText = document.getElementById('display-text');
        const meaningDisplay = document.getElementById('meaning-display');

        // NEW: Trigger Cartoon function
        function triggerCartoon() {
            const char = mascots[Math.floor(Math.random() * mascots.length)];
            const side = Math.random() > 0.5 ? 'pop-left' : 'pop-right';
            
            const mascotEl = document.createElement('div');
            mascotEl.className = `mascot ${side}`;
            mascotEl.textContent = char;
            
            document.body.appendChild(mascotEl);
            
            // Remove after animation finishes
            setTimeout(() => mascotEl.remove(), 1200);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        async function fetchMeaning(word) {
            const query = word || displayText.textContent.trim();
            if (!query) return;
            if (word) displayText.textContent = word;
            meaningDisplay.textContent = "🔍 Translating...";
            try {
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                meaningDisplay.textContent = `Meaning: ${data[0][0][0]}`;
            } catch (e) { meaningDisplay.textContent = "Error."; }
        }

        function renderLists() {
            renderWordList('dictList', dictionary, 'dictionary');
            renderWordList('goalList', goals, 'goals');
            localStorage.setItem('kanaDict_v3', JSON.stringify(dictionary));
            localStorage.setItem('kanaGoals_v3', JSON.stringify(goals));
        }

        function renderWordList(id, list, type) {
            const container = document.getElementById(id);
            container.innerHTML = list.length ? '' : '<div style="color:#ccc; padding:10px;">Empty</div>';
            list.forEach((word, i) => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${word}</span><div class="word-actions">
                    <button class="btn-coral" onclick="speak('${word}')">▶</button>
                    <button class="btn-blue" onclick="fetchMeaning('${word}')">🔍</button>
                    <button class="btn-red" onclick="deleteWord(${i}, '${type}')">🗑️</button>
                </div>`;
                container.appendChild(item);
            });
        }

        window.deleteWord = (i, type) => {
            if (type === 'dictionary') dictionary.splice(i, 1); else goals.splice(i, 1);
            renderLists();
        };

        document.getElementById('randomBtn').onclick = () => {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('randomModal').style.display = 'flex';
            document.body.classList.add('no-scroll');

            const list = document.getElementById('randomList');
            list.innerHTML = '';
            [...commonWords].sort(() => 0.5 - Math.random()).slice(0, 10).forEach(w => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${w}</span><button onclick="addGoal('${w}')" style="background:var(--goal-green); border:none; color:white; padding:8px; border-radius:8px; cursor:pointer;">+ Add</button>`;
                list.appendChild(item);
            });
        };

        window.closeModal = () => { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            document.getElementById('randomModal').style.display = 'none'; 
            document.body.classList.remove('no-scroll');
        };

        window.addGoal = (w) => { if(!goals.includes(w)) { goals.push(w); renderLists(); } };

        document.getElementById('repeatBtn').onclick = function() {
            if (repeatInterval) {
                clearInterval(repeatInterval);
                repeatInterval = null;
                this.classList.remove('active');
            } else {
                const txt = displayText.textContent;
                if (!txt) return;
                this.classList.add('active');
                speak(txt);
                repeatInterval = setInterval(() => speak(displayText.textContent), 2200);
            }
        };

        document.getElementById('saveBtn').onclick = () => { if(displayText.textContent && !dictionary.includes(displayText.textContent)) { dictionary.push(displayText.textContent); renderLists(); } };
        document.getElementById('goalBtn').onclick = () => { if(displayText.textContent && !goals.includes(displayText.textContent)) { goals.push(displayText.textContent); renderLists(); } };
        document.getElementById('googleBtn').onclick = () => fetchMeaning();
        document.getElementById('playBtn').onclick = () => speak(displayText.textContent);
        document.getElementById('clearBtn').onclick = () => { 
            displayText.textContent = ''; 
            meaningDisplay.textContent = 'Welcome! Start typing...';
            if(repeatInterval) { clearInterval(repeatInterval); repeatInterval = null; document.getElementById('repeatBtn').classList.remove('active'); }
        };

        function renderGrid() {
            const grid = document.getElementById('soundGrid');
            grid.innerHTML = '';
            document.getElementById('modeBtn').textContent = `Mode: ${['Hiragana', 'Katakana', 'Kanji'][currentMode]}`;
            kanaData.forEach(([h, k, e, kj, f]) => {
                const btn = document.createElement('button');
                if (!h) btn.className = 'char-btn empty';
                else {
                    btn.className = 'char-btn';
                    btn.style.backgroundColor = `rgba(var(--primary-base), ${0.1 + (f/10 * 0.9)})`;
                    btn.style.color = f > 6 ? 'white' : 'inherit';
                    let char = [h, k, kj][currentMode];
                    btn.innerHTML = `<div>${char}</div><div class="emoji-hint">${e}</div>`;
                    btn.onclick = () => { 
                        displayText.textContent += char; 
                        triggerCartoon(); // Added mascot trigger
                        if(!repeatInterval) speak(char); 
                    };
                }
                grid.appendChild(btn);
            });
        }

        document.getElementById('modeBtn').onclick = () => { currentMode = (currentMode + 1) % 3; renderGrid(); };
        
        renderGrid();
        renderLists();
    </script>
</body>
</html>
