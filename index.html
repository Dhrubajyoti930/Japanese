<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kana - Pro Edition</title>
    <style>
        :root {
            --primary-base: 255, 107, 107;
            --secondary-color: #4ecdc4;
            --google-blue: #4285F4;
            --goal-green: #2ecc71;
            --repeat-purple: #a29bfe;
            --repeat-active: #6c5ce7;
            --accent-color: #ffe66d;
            --bg-color: #f8f9fa;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
            overflow-x: hidden;
        }

        body.no-scroll { overflow: hidden; }

        .mascot {
            position: fixed;
            bottom: 20%;
            font-size: 80px;
            pointer-events: none;
            z-index: 2000;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        @keyframes bouncePop {
            0% { transform: translateY(100px) scale(0.5); opacity: 0; }
            60% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 0; }
        }

        .pop-anim { animation: bouncePop 1s ease forwards; }

        .typing-area {
            width: 100%;
            max-width: 500px;
            background: white;
            border: 3px solid var(--secondary-color);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        #display-text {
            min-height: 60px;
            font-size: 2.5rem;
            word-wrap: break-word;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            color: #2d3436;
        }

        #meaning-display {
            min-height: 24px;
            font-size: 1.1rem;
            color: #636e72;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btns button {
            padding: 10px 14px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #playBtn { background: rgb(var(--primary-base)); color: white; }
        #repeatBtn { background: var(--repeat-purple); color: white; }
        #repeatBtn.active { background: var(--repeat-active); box-shadow: 0 0 10px var(--repeat-active); }
        #googleBtn { background: var(--google-blue); color: white; }
        #saveBtn { background: var(--accent-color); }
        #goalBtn { background: var(--goal-green); color: white; }
        #backBtn { background: #fab1a0; color: #d63031; }
        #clearBtn { background: #dfe6e9; }

        #randomBtn { 
            background: linear-gradient(135deg, #9b59b6, #8e44ad); 
            color: white; width: 100%; max-width: 500px; 
            border-radius: 15px; padding: 16px; border:none; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
            font-size: 1.1rem;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 500px;
        }

        .char-btn {
            aspect-ratio: 1/1;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: none;
        }

        .emoji-hint { font-size: 0.7rem; margin-top: 2px; opacity: 0.8; }
        .empty { visibility: hidden; }

        .section-container { width: 100%; max-width: 500px; margin-top: 25px; }
        .section-title { font-weight: bold; border-left: 4px solid var(--secondary-color); padding-left: 10px; margin-bottom: 10px; }
        
        .word-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .word-item { 
            background: white; 
            padding: 10px 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .word-actions button {
            border: none; background: #f1f2f6; padding: 5px 8px; border-radius: 5px; cursor: pointer; margin-left: 3px;
        }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        #randomModal { display: none; flex-direction: column; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 400px; max-height: 80vh; }
    </style>
</head>
<body>

    <h2>Master Kana Writer <small>Pro</small></h2>

    <div class="typing-area">
        <div id="display-text"></div>
        <div id="meaning-display">Welcome! Start typing...</div>
        <div class="action-btns">
            <button id="playBtn">▶ Hear</button>
            <button id="repeatBtn">🔁 Loop</button>
            <button id="googleBtn">🔍 Mean</button>
            <button id="saveBtn">💾 Dict</button>
            <button id="goalBtn">🎯 Goal</button>
            <button id="backBtn">⌫</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <button id="randomBtn">🎲 Get Random 10 Study Words</button>

    <div class="controls-row">
        <button id="modeBtn" class="toggle-btn" style="background: var(--secondary-color);">Mode: Hiragana</button>
        <button id="diaBtn" class="toggle-btn" style="background: var(--repeat-purple);">Diacritics: Off</button>
    </div>

    <div id="soundGrid" class="grid"></div>

    <div class="section-container">
        <div class="section-title">🎯 Learning Goals</div>
        <div id="goalList" class="word-list"></div>
    </div>

    <div class="section-container">
        <div class="section-title">💾 Saved Dictionary</div>
        <div id="dictList" class="word-list"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="randomModal">
        <h3 style="margin-top:0">🎲 Today's Random 10</h3>
        <div id="randomList" class="word-list"></div>
        <button onclick="closeModal()" style="margin-top:15px; width:100%; padding:12px; border-radius:10px; border:none; background:#eee; cursor:pointer; font-weight:bold;">Close</button>
    </div>

    <script>
        const mascots = ['🐱', '🐰', '🦊', '🐻', '🐸', '🐼', '🐨', '🦄', '🐯'];
        const commonWords = ["私 (I)", "水 (Water)", "学校 (School)", "先生 (Teacher)", "学生 (Student)", "友達 (Friend)", "家族 (Family)", "本 (Book)", "猫 (Cat)", "犬 (Dog)", "食べる (Eat)", "飲む (Drink)", "行く (Go)", "来る (Come)", "今日 (Today)", "明日 (Tomorrow)", "日本 (Japan)", "名前 (Name)", "時間 (Time)", "元気 (Healthy)"];

        const kanaData = [
            ['あ','ア','🦆','鴨',9,null,null],['い','イ','🍓','苺',10,null,null],['う','ウ','🐰','兎',8,null,null],['え','エ','🍤','海老',4,null,null],['お','オ','👹','鬼',7,null,null],
            ['か','カ','🐦‍⬛','鴉',8,'が',null],['き','キ','🍄','茸',6,'ぎ',null],['く','ク','🐻','熊',6,'ぐ',null],['け','ケ','🪵','毛',4,'げ',null],['こ','コ','☕','粉',6,'ご',null],
            ['さ','サ','🐟','魚',5,'ざ',null],['し','シ','🦌','鹿',8,'じ',null],['す','ス','🍉','西瓜',6,'ず',null],['せ','セ','🧼','石鹸',3,'ぜ',null],['そ','ソ','🐘','象',4,'ぞ',null],
            ['た','タ','🐙','蛸',7,'だ',null],['ち','チ','🧀','乳',4,'ぢ',null],['つ','ツ','🌙','月',5,'づ',null],['て','テ','✋','手',8,'で',null],['と','ト','🐯','虎',7,'ど',null],
            ['な','ナ','🍆','茄子',7,null,null],['に','ニ','🥕','人参',9,null,null],['ぬ','ヌ','🧣','布',2,null,null],['ね','ネ','🐱','猫',3,null,null],['の','ノ','🪵','糊',10,null,null],
            ['は','ハ','🌸','花',7,'ば','ぱ'],['ひ','ヒ','🐑','羊',3,'び','ぴ'],['ふ','フ','🚢','船',3,'ぶ','ぷ'],['へ','ヘ','🐍','蛇',2,'べ','ぺ'],['ほ','ホ','🌠','星',3,'ぼ','ぽ'],
            ['ま','マ','🍄','豆',5,null,null],['み','ミ','🍊','蜜柑',4,null,null],['む','ム','🐞','虫',3,null,null],['め','メ','👓','目',3,null,null],['も','モ','🍑','桃',5,null,null],
            ['や','ヤ','⛰️','山',4,null,null],[null,null,'','',0],['ゆ','ユ','❄️','雪',3,null,null],[null,null,'','',0],['よ','ヨ','⛵','夜',5,null,null],
            ['ら','ラ','🦁','雷',5,null,null],['り','リ','🍎','林檎',5,null,null],['る','ル','💡','留',7,null,null],['れ','レ','🍋','礼',4,null,null],['ろ','ロ','🕯️','蝋',3,null,null],
            ['わ','ワ','🐊','和',4,null,null],[null,null,'','',0],[null,null,'','',0],[null,null,'','',0],['を','ヲ','🔗','遠',6,null,null],
            [null,null,'','',0],[null,null,'','',0],[null,null,'','',0],[null,null,'','',0],['ん','ン','🔔','運',9,null,null]
        ];

        let currentMode = 0, diacriticMode = 0;
        let dictionary = JSON.parse(localStorage.getItem('kanaDict_v4') || '[]');
        let goals = JSON.parse(localStorage.getItem('kanaGoals_v4') || '[]');
        let repeatInterval = null;

        const displayText = document.getElementById('display-text');
        const meaningDisplay = document.getElementById('meaning-display');

        function convertToKatakana(h) { return h.replace(/[ぁ-ん]/g, m => String.fromCharCode(m.charCodeAt(0) + 96)); }
        
        function triggerCartoon() {
            const mascot = document.createElement('div');
            mascot.className = 'mascot pop-anim';
            mascot.textContent = mascots[Math.floor(Math.random() * mascots.length)];
            mascot.style.left = (Math.random() * 80 + 10) + '%';
            document.body.appendChild(mascot);
            setTimeout(() => mascot.remove(), 1000);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            if (!text) return;
            const ut = new SpeechSynthesisUtterance(text.split(' ')[0]);
            ut.lang = 'ja-JP';
            window.speechSynthesis.speak(ut);
        }

        async function fetchMeaning(word) {
            const query = word || displayText.textContent.trim();
            if (!query) return;
            meaningDisplay.textContent = "🔍 Thinking...";
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                meaningDisplay.textContent = `Meaning: ${data[0][0][0]}`;
            } catch (e) { meaningDisplay.textContent = "Error."; }
        }

        function renderLists() {
            const render = (id, list, type) => {
                const el = document.getElementById(id);
                el.innerHTML = list.length ? '' : '<div style="color:#ccc">Empty</div>';
                list.forEach((w, i) => {
                    const item = document.createElement('div');
                    item.className = 'word-item';
                    item.innerHTML = `<span>${w}</span><div class="word-actions">
                        <button onclick="speak('${w}')">▶</button>
                        <button onclick="fetchMeaning('${w.split(' ')[0]}')">🔍</button>
                        <button onclick="deleteWord(${i}, '${type}')">🗑️</button>
                    </div>`;
                    el.appendChild(item);
                });
            };
            render('dictList', dictionary, 'dict');
            render('goalList', goals, 'goal');
            localStorage.setItem('kanaDict_v4', JSON.stringify(dictionary));
            localStorage.setItem('kanaGoals_v4', JSON.stringify(goals));
        }

        window.deleteWord = (i, type) => {
            if (type === 'dict') dictionary.splice(i, 1); else goals.splice(i, 1);
            renderLists();
        };

        document.getElementById('saveBtn').onclick = () => { if(displayText.textContent && !dictionary.includes(displayText.textContent)) { dictionary.push(displayText.textContent); renderLists(); } };
        document.getElementById('goalBtn').onclick = () => { if(displayText.textContent && !goals.includes(displayText.textContent)) { goals.push(displayText.textContent); renderLists(); } };
        
        document.getElementById('randomBtn').onclick = () => {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('randomModal').style.display = 'flex';
            const list = document.getElementById('randomList');
            list.innerHTML = '';
            [...commonWords].sort(() => 0.5 - Math.random()).slice(0, 10).forEach(w => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${w}</span><button onclick="addGoal('${w}')" style="background:var(--goal-green); color:white; border:none; padding:5px 10px; border-radius:8px;">+ Add</button>`;
                list.appendChild(item);
            });
        };

        window.addGoal = (w) => { if(!goals.includes(w)) { goals.push(w); renderLists(); } };
        window.closeModal = () => { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('randomModal').style.display = 'none'; };

        function renderGrid() {
            const grid = document.getElementById('soundGrid');
            grid.innerHTML = '';
            document.getElementById('modeBtn').textContent = `Mode: ${['Hiragana', 'Katakana', 'Kanji'][currentMode]}`;
            const diaLabels = ["Off", "Dakuten", "Handakuten"];
            document.getElementById('diaBtn').textContent = `Dia: ${diaLabels[diacriticMode]}`;

            kanaData.forEach(data => {
                const [h, k, e, kj, f, dak, han] = data;
                const btn = document.createElement('button');
                if (!h) { btn.className = 'char-btn empty'; }
                else {
                    btn.className = 'char-btn';
                    btn.style.backgroundColor = `rgba(var(--primary-base), ${0.1 + (f/10 * 0.9)})`;
                    btn.style.color = f > 6 ? 'white' : 'inherit';
                    let char;
                    if (currentMode === 2) char = kj;
                    else {
                        let base = (currentMode === 0) ? h : k;
                        if (diacriticMode === 1 && dak) char = (currentMode === 0) ? dak : convertToKatakana(dak);
                        else if (diacriticMode === 2 && han) char = (currentMode === 0) ? han : convertToKatakana(han);
                        else char = base;
                    }
                    btn.innerHTML = `<div>${char}</div><div class="emoji-hint">${e}</div>`;
                    btn.onclick = () => { displayText.textContent += char; triggerCartoon(); if(!repeatInterval) speak(char); };
                }
                grid.appendChild(btn);
            });
        }

        document.getElementById('modeBtn').onclick = () => { currentMode = (currentMode + 1) % 3; renderGrid(); };
        document.getElementById('diaBtn').onclick = () => { diacriticMode = (diacriticMode + 1) % 3; renderGrid(); };
        document.getElementById('backBtn').onclick = () => { displayText.textContent = displayText.textContent.slice(0, -1); };
        document.getElementById('clearBtn').onclick = () => { displayText.textContent = ''; meaningDisplay.textContent = 'Ready...'; if(repeatInterval) { clearInterval(repeatInterval); repeatInterval = null; document.getElementById('repeatBtn').classList.remove('active'); } };
        document.getElementById('googleBtn').onclick = () => fetchMeaning();
        document.getElementById('playBtn').onclick = () => speak(displayText.textContent);
        document.getElementById('repeatBtn').onclick = function() {
            if (repeatInterval) { clearInterval(repeatInterval); repeatInterval = null; this.classList.remove('active'); }
            else { if (!displayText.textContent) return; this.classList.add('active'); speak(displayText.textContent); repeatInterval = setInterval(() => speak(displayText.textContent), 2500); }
        };

        renderGrid();
        renderLists();
    </script>
</body>
</html>
